<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寶寶發展追蹤｜個人化里程碑</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/drawer.css">
</head>
<body>

<!-- ══════════════════════════════════════
     SETUP SCREEN
     ══════════════════════════════════════ -->
<div id="setup-screen">
  <div class="setup-card">
    <span class="setup-icon">🌱</span>
    <h1>寶寶發展追蹤</h1>
    <p>輸入寶寶的姓名與出生日期，每次打開都會根據<strong>實際月齡與週數</strong>顯示當前發展任務清單。</p>
    <div class="input-group">
      <label>寶寶的名字</label>
      <input type="text" id="baby-name-input" placeholder="例：小橘子" maxlength="20">
    </div>
    <div class="input-group">
      <label>出生日期</label>
      <input type="date" id="birth-date-input">
    </div>
    <button class="btn-primary" onclick="saveAndStart()">開始追蹤 →</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     MAIN APP
     ══════════════════════════════════════ -->
<div id="app-screen">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-label">Baby Development Tracker</div>
      <div class="topbar-name" id="display-name">寶寶</div>
    </div>
    <div class="age-badge">
      <div class="age-main" id="display-age">0m 0w</div>
      <div class="age-sub"  id="display-age-exact">0個月 0週</div>
    </div>
    <button class="topbar-change" onclick="changeProfile()">更改資料</button>
  </div>

  <!-- TIMELINE BAR（吸頂，可展開） -->
  <div class="timeline-bar">
    <div class="timeline-collapsed" onclick="toggleTimeline()">
      <span class="tl-label">0m</span>
      <div class="tl-track">
        <div class="tl-fill" id="tl-fill"></div>
        <div class="tl-cursor" id="tl-cursor"></div>
      </div>
      <span class="tl-label">24m</span>
      <div class="tl-expand-btn" id="tl-expand-btn">
        <span id="tl-expand-label">展開時間軸</span>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <div class="timeline-expanded" id="tl-expanded">
      <div class="tl-scroll" id="tl-scroll">
        <div class="tl-nodes" id="tl-nodes"></div>
      </div>
      <div class="tl-scroll-hint">← 左右滑動查看完整時間軸 →</div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <!-- Progress strip -->
    <div class="progress-strip fade-in">
      <div class="progress-info">
        <h2 id="current-stage-label">新生兒期</h2>
        <p  id="progress-desc">距離下一個發展階段還有 — 天</p>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-label">
          <span>出生</span>
          <span>12個月</span>
          <span>24個月</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Alert -->
    <div class="alert-strip" id="alert-strip"></div>

    <!-- Current todo card -->
    <div class="section-title">本週發展任務清單</div>
    <div class="todo-card fade-in" id="todo-card">
      <h3 id="todo-title">載入中…</h3>
      <p class="todo-subtitle" id="todo-subtitle"></p>
      <div id="todo-domains"></div>

      <!-- Piaget trigger -->
      <div class="piaget-trigger-wrap">
        <button class="piaget-trigger" onclick="openPiagetDrawer()">
          <span class="piaget-trigger-icon">🔬</span>
          <div class="piaget-trigger-text">
            <div class="piaget-trigger-label">延伸探索 — 皮亞傑認知發展</div>
            <div class="piaget-trigger-desc" id="piaget-trigger-desc">查看本階段對應的認知架構與促進活動</div>
          </div>
          <span class="piaget-trigger-arrow">→</span>
        </button>
      </div>
    </div>

    <!-- Upcoming milestones -->
    <div class="section-title" id="upcoming-title">即將到來的里程碑</div>
    <div class="upcoming-grid" id="upcoming-grid"></div>

    <button class="reset-btn" onclick="resetChecks()">重設勾選狀態</button>

  </div><!-- /content -->
</div><!-- /app-screen -->

<!-- ══════════════════════════════════════
     PIAGET DRAWER
     ══════════════════════════════════════ -->
<div id="piaget-overlay" onclick="closePiagetDrawer()"></div>

<div id="piaget-drawer" role="dialog" aria-modal="true" aria-label="皮亞傑認知發展延伸探索">

  <div class="drawer-header">
    <div class="drawer-header-top">
      <div>
        <div class="drawer-eyebrow">延伸探索 · Piaget Framework</div>
        <div class="drawer-title">
          認知發展理論
          <span id="drawer-stage-subtitle">Jean Piaget · 1896–1980</span>
        </div>
      </div>
      <button class="drawer-close" onclick="closePiagetDrawer()" aria-label="關閉">✕</button>
    </div>
    <div class="drawer-stage-badge">
      <div class="drawer-stage-dot"></div>
      <span class="drawer-stage-name" id="drawer-piaget-stage">感覺動作期</span>
      <span class="drawer-stage-age"  id="drawer-piaget-age">0–2 歲</span>
    </div>
  </div>

  <div class="drawer-body" id="drawer-body-content">
    <!-- dynamically rendered by drawer.js -->
  </div>

  <div class="drawer-footer">
    <p class="drawer-footer-note">
      皮亞傑階段為認知發展方向參考，非診斷工具。<br>
      個體節奏有差異，階段順序固定但速度因人而異。
    </p>
  </div>

</div>

<!-- ES Module 入口（type="module" 自動 defer） -->
<script type="module" src="js/app.js"></script>

</body>
</html>
