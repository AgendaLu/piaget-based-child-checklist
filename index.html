<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寶寶發展追蹤｜個人化里程碑</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans:  ['Noto Sans TC', 'sans-serif'],
            serif: ['Noto Serif TC', 'serif'],
            mono:  ['DM Mono', 'monospace'],
          },
          colors: {
            /* M3 Neutral */
            surface:          { DEFAULT: '#FFFBFE', dim: '#DED8E1', container: '#F3EDF7', 'container-low': '#F7F2FA', 'container-high': '#ECE6F0', 'container-highest': '#E6E0E9' },
            'on-surface':     { DEFAULT: '#1D1B20', variant: '#49454F' },
            outline:          { DEFAULT: '#79747E', variant: '#CAC4D0' },
            /* M3 Primary — warm amber/terracotta */
            primary:          { DEFAULT: '#8B5000', container: '#FFDDB5', 'on-container': '#2C1600' },
            'on-primary':     { DEFAULT: '#FFFFFF' },
            /* M3 Secondary */
            secondary:        { DEFAULT: '#6F5B40', container: '#FBDEBC', 'on-container': '#271904' },
            /* M3 Tertiary — teal */
            tertiary:         { DEFAULT: '#51643F', container: '#D4E9BB', 'on-container': '#0F2000' },
            /* M3 Error */
            error:            { DEFAULT: '#BA1A1A', container: '#FFDAD6' },
            /* Domain colors */
            domain: {
              gross:     '#2E6B3E',
              fine:      '#1E4D82',
              language:  '#8A6420',
              cognitive: '#5A3878',
              social:    '#1E6B6B',
            },
            /* Status */
            retro:  { DEFAULT: '#C9938F', pale: '#F7EFEE', border: '#E0BDB9' },
            piaget: { DEFAULT: '#3D5A80', pale: '#EEF2F8', mid: '#6A8EAE', border: '#B0C4DE' },
          },
          borderRadius: {
            'xs':  '4px',
            'sm':  '8px',
            'md':  '12px',
            'lg':  '16px',
            'xl':  '20px',
            '2xl': '28px',
            'full': '9999px',
          },
          boxShadow: {
            'elevation-1': '0 1px 3px 1px rgba(0,0,0,0.15), 0 1px 2px rgba(0,0,0,0.3)',
            'elevation-2': '0 2px 6px 2px rgba(0,0,0,0.15), 0 1px 2px rgba(0,0,0,0.3)',
            'elevation-3': '0 4px 8px 3px rgba(0,0,0,0.15), 0 1px 3px rgba(0,0,0,0.3)',
          },
        }
      }
    }
  </script>

  <!-- Minimal custom CSS for states & transitions -->
  <link rel="stylesheet" href="theme.css">
</head>
<body class="bg-surface font-sans text-on-surface min-h-screen">

<!-- ══════════════ SETUP SCREEN ══════════════ -->
<div id="setup-screen" class="flex items-center justify-center min-h-screen p-6">
  <div class="bg-surface-container-low rounded-2xl p-10 sm:p-12 max-w-md w-full shadow-elevation-3 text-center animate-fade-up">
    <span class="text-5xl block mb-6 animate-bounce-slow">🌱</span>
    <h1 class="font-serif text-2xl font-bold mb-2 text-on-surface">寶寶發展追蹤</h1>
    <p class="text-sm text-on-surface-variant leading-relaxed mb-8">
      輸入寶寶的姓名與出生日期，每次打開都會根據<strong class="text-on-surface">實際月齡與週數</strong>顯示當前發展任務清單。
    </p>
    <div class="text-left mb-5">
      <label class="block text-xs font-medium tracking-widest uppercase text-on-surface-variant mb-2">寶寶的名字</label>
      <input type="text" id="baby-name-input" placeholder="例：小橘子" maxlength="20"
             class="w-full px-4 py-3 border border-outline-variant rounded-md bg-surface font-sans text-base text-on-surface outline-none transition-colors focus:border-primary focus:bg-surface-container-low">
    </div>
    <div class="text-left mb-6">
      <label class="block text-xs font-medium tracking-widest uppercase text-on-surface-variant mb-2">出生日期</label>
      <input type="date" id="birth-date-input"
             class="w-full px-4 py-3 border border-outline-variant rounded-md bg-surface font-sans text-base text-on-surface outline-none transition-colors focus:border-primary focus:bg-surface-container-low">
    </div>
    <button class="btn-filled w-full" onclick="saveAndStart()">開始追蹤</button>
  </div>
</div>

<!-- ══════════════ MAIN APP ══════════════ -->
<div id="app-screen" style="display:none">

  <!-- TOPBAR -->
  <div class="bg-primary-container sticky top-0 z-50 px-6 sm:px-8 py-4 flex items-center gap-5">
    <div class="flex-1 min-w-0">
      <div class="font-mono text-[10px] tracking-[0.15em] uppercase text-primary opacity-80 mb-0.5">Baby Development Tracker</div>
      <div class="font-serif text-xl font-bold text-primary-on-container truncate" id="display-name">寶寶</div>
    </div>
    <div class="bg-primary text-on-primary rounded-full px-5 py-2 text-center shrink-0">
      <div class="font-mono text-xl font-medium leading-tight" id="display-age">0個月</div>
      <div class="text-[10px] opacity-85 mt-0.5" id="display-age-exact">0週</div>
    </div>
    <button class="btn-outlined-on-surface text-xs" onclick="changeProfile()">更改資料</button>
  </div>

  <!-- TIMELINE BAR -->
  <div class="bg-surface-container-low border-b border-outline-variant sticky top-[72px] z-40 px-6 sm:px-8">
    <!-- Stage info row -->
    <div class="flex items-center gap-3 py-3 select-none">
      <div class="flex-1 flex items-baseline gap-3 min-w-0">
        <span class="font-serif text-sm font-semibold text-on-surface whitespace-nowrap" id="current-stage-label">新生兒期</span>
        <span class="text-xs text-on-surface-variant whitespace-nowrap overflow-hidden text-ellipsis" id="progress-desc">距離下一個發展階段還有 — 天</span>
      </div>
    </div>

    <!-- Slider timeline -->
    <div class="tl-slider-wrap pb-4" id="tl-slider-wrap">
      <div class="tl-slider" id="tl-slider">
        <!-- Track background (full) -->
        <div class="tl-track" id="tl-track"></div>
        <!-- Track fill (up to current) -->
        <div class="tl-track-fill" id="tl-track-fill"></div>
        <!-- Nodes rendered by JS -->
        <div class="tl-nodes-layer" id="tl-nodes"></div>
        <!-- Draggable thumb -->
        <div class="tl-thumb" id="tl-thumb">
          <div class="tl-thumb-pip"></div>
          <div class="tl-thumb-label" id="tl-thumb-label"></div>
        </div>
      </div>
      <!-- Labels row -->
      <div class="tl-labels" id="tl-labels"></div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="max-w-[900px] px-6 sm:px-8 py-7">

    <!-- Alert -->
    <div class="alert-strip hidden mb-5 rounded-md border border-error/30 border-l-4 border-l-error bg-error-container/40 px-4 py-3 text-sm text-error leading-relaxed" id="alert-strip"></div>

    <!-- Section title -->
    <div class="flex items-center gap-3 mb-5 text-on-surface-variant">
      <span class="font-mono text-xs tracking-[0.12em] uppercase font-medium">本週發展任務清單</span>
      <div class="flex-1 h-px bg-outline-variant"></div>
    </div>

    <!-- Todo card -->
    <div class="todo-card bg-surface-container-low rounded-xl shadow-elevation-1 p-6 sm:p-8 mb-6 animate-fade-up" id="todo-card">
      <h3 class="font-serif text-2xl font-bold mb-2 text-on-surface" id="todo-title">載入中…</h3>
      <p class="text-sm text-on-surface-variant leading-relaxed mb-6" id="todo-subtitle"></p>
      <div id="todo-domains"></div>

      <!-- Piaget trigger -->
      <div class="piaget-trigger-wrap mt-5 pt-5 border-t border-dashed border-piaget-border">
        <button class="flex items-center gap-3 w-full px-4 py-3 bg-piaget-pale border border-piaget-border rounded-md text-left font-sans hover:bg-[#E2EBF5] hover:border-piaget hover:-translate-y-px hover:shadow-elevation-1 transition-all" onclick="openPiagetDrawer()">
          <span class="text-xl shrink-0">🔬</span>
          <div class="flex-1 min-w-0">
            <div class="text-[11px] tracking-[0.1em] uppercase text-piaget font-semibold mb-px">延伸探索 — 皮亞傑認知發展</div>
            <div class="text-xs text-piaget-mid leading-snug" id="piaget-trigger-desc">查看本階段對應的認知架構與促進活動</div>
          </div>
          <span class="text-piaget-mid transition-transform group-hover:translate-x-1">→</span>
        </button>
      </div>
    </div>

    <!-- Upcoming milestones -->
    <div class="flex items-center gap-3 mb-5 text-on-surface-variant" id="upcoming-title">
      <span class="font-mono text-xs tracking-[0.12em] uppercase font-medium">即將到來的里程碑</span>
      <div class="flex-1 h-px bg-outline-variant"></div>
    </div>
    <div class="grid grid-cols-[repeat(auto-fill,minmax(240px,1fr))] gap-3 mb-8" id="upcoming-grid"></div>

    <button class="btn-text mx-auto block mb-10" onclick="resetChecks()">重設勾選狀態</button>

  </div><!-- /content -->
</div><!-- /app-screen -->

<!-- ══════════════ PIAGET DRAWER ══════════════ -->
<div id="piaget-overlay" class="fixed inset-0 bg-on-surface/50 z-[200] opacity-0 pointer-events-none transition-opacity backdrop-blur-sm" onclick="closePiagetDrawer()"></div>

<div id="piaget-drawer" role="dialog" aria-modal="true" aria-label="皮亞傑認知發展延伸探索"
     class="fixed top-0 right-0 w-[min(540px,100vw)] h-screen bg-surface z-[201] translate-x-full transition-transform duration-350 ease-[cubic-bezier(0.32,0.72,0,1)] overflow-y-auto flex flex-col">

  <div class="bg-piaget text-white px-7 pt-6 pb-5 sticky top-0 z-10 shrink-0">
    <div class="flex items-start justify-between mb-3">
      <div>
        <div class="font-mono text-[10px] tracking-[0.2em] uppercase text-white/55 mb-1">延伸探索 · Piaget Framework</div>
        <div class="font-serif text-2xl font-bold leading-tight">
          認知發展理論
          <span class="block text-white/65 font-normal italic text-xs mt-0.5" id="drawer-stage-subtitle">Jean Piaget · 1896–1980</span>
        </div>
      </div>
      <button class="bg-white/10 hover:bg-white/20 border-none text-white w-9 h-9 rounded-full text-lg flex items-center justify-center transition-colors shrink-0" onclick="closePiagetDrawer()" aria-label="關閉">✕</button>
    </div>
    <div class="inline-flex items-center gap-2 bg-white/10 border border-white/20 rounded-sm px-3 py-1.5 text-sm">
      <div class="w-2 h-2 rounded-full bg-[#E8895C] shrink-0"></div>
      <span class="font-semibold" id="drawer-piaget-stage">感覺動作期</span>
      <span class="opacity-70 text-xs" id="drawer-piaget-age">0–2 歲</span>
    </div>
  </div>

  <!-- Stage dropdown selector -->
  <div class="px-7 py-3 bg-surface-container-low border-b border-outline-variant sticky top-[120px] z-[9] shrink-0" id="drawer-stage-selector"></div>

  <div class="p-7 flex-1" id="drawer-body-content"></div>

  <div class="px-7 py-4 pb-7 border-t border-outline-variant bg-surface shrink-0">
    <p class="text-[11px] text-on-surface-variant leading-relaxed text-center">
      皮亞傑階段為認知發展方向參考，非診斷工具。<br>
      個體節奏有差異，階段順序固定但速度因人而異。
    </p>
  </div>
</div>

<!-- ES Module -->
<script type="module" src="app.js"></script>
</body>
</html>
