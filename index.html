<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寶寶發展追蹤｜個人化里程碑</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ink': 'oklch(15% 0.05 280)',
            'ink-soft': 'oklch(45% 0.08 280)',
            'ink-faint': 'oklch(65% 0.06 280)',
            'surface': 'oklch(99% 0.001 0)',
            'bg': 'oklch(95% 0.01 280)',
            'border': 'oklch(87% 0.02 280)',
            'domain-gross': 'oklch(65% 0.25 142)',
            'domain-gross-light': 'oklch(92% 0.06 142)',
            'domain-fine': 'oklch(55% 0.22 260)',
            'domain-fine-light': 'oklch(91% 0.05 260)',
            'domain-language': 'oklch(65% 0.20 85)',
            'domain-language-light': 'oklch(93% 0.04 85)',
            'domain-cognitive': 'oklch(60% 0.15 310)',
            'domain-cognitive-light': 'oklch(92% 0.04 310)',
            'domain-social': 'oklch(60% 0.20 200)',
            'domain-social-light': 'oklch(91% 0.05 200)',
            'retro': 'oklch(70% 0.15 20)',
            'retro-light': 'oklch(93% 0.03 20)',
            'piaget': 'oklch(58% 0.15 250)',
            'piaget-light': 'oklch(92% 0.04 250)',
          },
          fontFamily: {
            'display': ['Noto Serif TC', 'Georgia', 'serif'],
            'body': ['Noto Sans TC', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
            'mono': ['DM Mono', 'Menlo', 'monospace'],
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(16px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
          },
          animation: {
            fadeUp: 'fadeUp 0.4s ease both',
            fadeIn: 'fadeIn 0.3s ease',
          },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Noto Serif TC', Georgia, serif;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeUp 0.4s ease both; }
    .open { display: block !important; }

    /* Task checkboxes */
    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 0;
      cursor: pointer;
      user-select: none;
    }

    .todo-checkbox {
      width: 20px;
      height: 20px;
      min-width: 20px;
      border: 2px solid oklch(87% 0.02 280);
      border-radius: 4px;
      background: white;
      transition: all 0.2s ease;
      margin-top: 2px;
    }

    .todo-item:hover .todo-checkbox {
      border-color: oklch(60% 0.15 280);
    }

    .todo-item.done-normal .todo-checkbox {
      background: oklch(65% 0.25 142);
      border-color: oklch(65% 0.25 142);
      position: relative;
    }

    .todo-item.done-normal .todo-checkbox::after {
      content: '✓';
      position: absolute;
      top: -3px;
      left: 3px;
      color: white;
      font-weight: bold;
      font-size: 14px;
    }

    .todo-item.done-retro .todo-checkbox {
      background: oklch(70% 0.15 20);
      border-color: oklch(70% 0.15 20);
      position: relative;
    }

    .todo-item.done-retro .todo-checkbox::after {
      content: '⟲';
      position: absolute;
      top: -4px;
      left: 2px;
      color: white;
      font-weight: bold;
      font-size: 13px;
    }

    .todo-item.done-intermediate .todo-checkbox {
      background: oklch(65% 0.20 200);
      border-color: oklch(65% 0.20 200);
      position: relative;
    }

    .todo-item.done-intermediate .todo-checkbox::after {
      content: '⏱';
      position: absolute;
      top: -3px;
      left: 3px;
      color: white;
      font-weight: bold;
      font-size: 13px;
    }

    .todo-item.locked .todo-checkbox {
      background: oklch(87% 0.02 280);
      border-color: oklch(87% 0.02 280);
      cursor: not-allowed;
    }

    .todo-item.locked {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.5;
      color: oklch(15% 0.05 280);
    }

    .domain-section {
      margin-bottom: 20px;
    }

    .domain-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      margin-bottom: 12px;
      font-size: 15px;
    }

    .domain-pip {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    /* Achievement bar colors */
    .achievement-fill.fill-intermediate {
      background: oklch(65% 0.20 200);
    }

    .achievement-pct.has-intermediate {
      color: oklch(65% 0.20 200);
    }

    /* ── 百分位條 ───────────────────────────── */
    .pct-bar-wrap {
      /* 左側 32px = checkbox(20) + gap(12) 對齊文字 */
      margin: 1px 0 10px 32px;
      cursor: default;
      user-select: none;
    }

    .pct-track-area {
      position: relative;
      height: 27px;  /* 13px bar zone + 14px label zone */
    }

    /* 底部灰色軌道 */
    .pct-rail {
      position: absolute;
      top: 4px;
      left: 0;
      right: 0;
      height: 4px;
      background: oklch(90% 0.015 280);
      border-radius: 2px;
    }

    /* p10–p90 外部區間（pale green） */
    .pct-zone-outer {
      position: absolute;
      top: 4px;
      height: 4px;
      background: oklch(82% 0.10 142 / 0.55);
      border-radius: 2px;
    }

    /* p25–p75 中間區間（stronger green） */
    .pct-zone-inner {
      position: absolute;
      top: 3px;
      height: 6px;
      background: oklch(65% 0.22 142 / 0.45);
      border-radius: 3px;
    }

    /* p50 刻度線 */
    .pct-median {
      position: absolute;
      top: 1px;
      width: 1.5px;
      height: 10px;
      background: oklch(55% 0.20 142 / 0.70);
      border-radius: 1px;
      transform: translateX(-50%);
    }

    /* 寶寶當前月齡圓點 */
    .pct-baby-dot {
      position: absolute;
      top: 0;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      transform: translateX(-50%);
      border: 2px solid white;
      box-shadow: 0 1px 4px oklch(0% 0 0 / 0.25);
      z-index: 2;
      transition: left 0.25s ease;
    }

    /* 標籤列 */
    .pct-labels-row {
      position: absolute;
      top: 15px;
      left: 0;
      right: 0;
      height: 12px;
      pointer-events: none;
    }

    .pct-label {
      position: absolute;
      font-family: 'DM Mono', Menlo, monospace;
      font-size: 9px;
      line-height: 1;
      color: oklch(55% 0.06 280);
      white-space: nowrap;
      font-weight: 500;
    }

    /* locked 狀態下不顯示百分位條 */
    .todo-item.locked + .pct-bar-wrap {
      display: none;
    }

    /* ── Timeline 彩度降低（降焦） ───────────────────────── */
    .tl-stamp {
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    /* 時間軸背景和軌道降彩到 66% */
    #tl-fill, #d3-timeline-container {
      opacity: 0.66;
      transition: opacity 0.2s ease;
    }

    /* 時間軸節點選中時恢復彩度 */
    #tl-nodes .tl-node.active {
      opacity: 1;
    }

    #tl-nodes .tl-node:not(.active) {
      opacity: 0.66;
    }

    /* 進度條軌道降彩 */
    .bg-border.rounded-full {
      opacity: 0.66;
    }

    /* ── 皮亞傑認知發展模態 ───────────────────────── */
    #piaget-modal {
      animation: slideUp 0.3s ease-out;
    }

    #piaget-modal.hidden,
    #piaget-modal-overlay.hidden {
      display: none;
    }

    /* 時間軸卡片 */
    .piaget-timeline-card {
      padding: 12px;
      border-radius: 8px;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
      min-width: 0;
    }

    .piaget-timeline-card:hover {
      background: oklch(91% 0.05 280);
    }

    .piaget-timeline-card.active {
      background: oklch(91% 0.08 280);
      border-left-color: oklch(60% 0.20 200);
    }

    .piaget-timeline-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .piaget-timeline-dot.past {
      background: oklch(65% 0.25 142);
    }

    .piaget-timeline-dot.current {
      background: oklch(60% 0.20 200);
    }

    .piaget-timeline-dot.future {
      background: transparent;
      border: 2px solid oklch(87% 0.02 280);
      width: 6px;
      height: 6px;
      margin-left: 1px;
    }

    /* 手風琴 */
    .piaget-accordion-header {
      padding: 12px 0;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid oklch(87% 0.02 280);
      transition: color 0.2s ease;
      user-select: none;
    }

    .piaget-accordion-header:hover {
      color: oklch(60% 0.20 200);
    }

    /* 第一個手風琴（理論闡述）的特殊樣式 */
    .piaget-accordion-item:first-of-type .piaget-accordion-header {
      color: oklch(60% 0.20 200);
      font-weight: 700;
      padding: 14px 0;
    }

    .piaget-accordion-item:first-of-type .piaget-accordion-header:hover {
      color: oklch(65% 0.22 210);
    }

    .piaget-accordion-toggle {
      display: inline-block;
      font-size: 12px;
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }

    .piaget-accordion-toggle.collapsed {
      transform: rotate(-90deg);
    }

    .piaget-accordion-content {
      max-height: 1000px;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
      padding-top: 12px;
    }

    .piaget-accordion-content.collapsed {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      visibility: hidden;
    }

    /* 內容卡片重複使用 schema-link 等樣式 */
    .piaget-schema-link {
      display: flex;
      gap: 12px;
      padding: 16px;
      background: oklch(93% 0.05 280);
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .piaget-schema-icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    .piaget-schema-text {
      font-size: 14px;
      line-height: 1.5;
      color: oklch(35% 0.08 280);
    }

    /* 響應式設計 - 移動優先 */
    @media (max-width: 640px) {
      #piaget-modal {
        flex-direction: column;
      }

      #piaget-timeline-mobile {
        display: flex !important;
        flex-wrap: wrap;
      }

      .piaget-timeline-card {
        flex: 0 1 calc(50% - 4px);
      }

      #piaget-modal-body {
        min-height: 0;
      }
    }

    @media (min-width: 641px) {
      #piaget-timeline-mobile {
        display: none !important;
      }

      #piaget-timeline {
        display: flex !important;
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(10px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* ── 即將到來的里程碑卡片 ───────────────────────── */
    .upcoming-card {
      background: oklch(99% 0.001 0);
      border: 1px solid oklch(87% 0.02 280);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s ease;
      box-shadow: 0 1px 3px oklch(0% 0 0 / 0.1);
    }

    .upcoming-card:hover {
      border-color: oklch(70% 0.08 280);
      box-shadow: 0 4px 12px oklch(0% 0 0 / 0.15);
      transform: translateY(-2px);
    }

    .uc-month {
      font-family: 'Noto Serif TC', Georgia, serif;
      font-size: 20px;
      font-weight: 600;
      color: oklch(15% 0.05 280);
      margin-bottom: 4px;
    }

    .uc-label {
      font-size: 13px;
      color: oklch(50% 0.08 280);
      font-weight: 500;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .upcoming-card ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .upcoming-card li {
      font-size: 13px;
      color: oklch(35% 0.06 280);
      line-height: 1.4;
      padding-left: 16px;
      position: relative;
    }

    .upcoming-card li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: oklch(65% 0.15 280);
      font-weight: 600;
    }

    /* ── Dark mode 下的卡片樣式 ──────────────────────── */
    @media (prefers-color-scheme: dark) {
      .upcoming-card {
        background: oklch(19% 0.02 280);
        border-color: oklch(30% 0.02 280);
      }

      .upcoming-card:hover {
        border-color: oklch(45% 0.08 280);
        box-shadow: 0 4px 12px oklch(0% 0 0 / 0.4);
      }

      .uc-month {
        color: oklch(92% 0.02 280);
      }

      .uc-label {
        color: oklch(65% 0.06 280);
      }

      .upcoming-card li {
        color: oklch(72% 0.04 280);
      }

      .upcoming-card li::before {
        color: oklch(60% 0.12 280);
      }
    }

    /* ── Dark mode ──────────────────────────────────────── */
    :root { color-scheme: light dark; }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: oklch(13% 0.02 280);
        color: oklch(88% 0.02 280);
      }
      h1, h2, h3, h4, h5, h6 { color: oklch(92% 0.02 280); }

      /* ── Tailwind color class overrides ── */
      .bg-bg      { background-color: oklch(13% 0.02 280) !important; }
      .bg-surface { background-color: oklch(19% 0.02 280) !important; }
      .bg-border  { background-color: oklch(28% 0.02 280) !important; }
      .text-ink       { color: oklch(92% 0.02 280) !important; }
      .text-ink-soft  { color: oklch(68% 0.05 280) !important; }
      .text-ink-faint { color: oklch(52% 0.06 280) !important; }
      .border-border   { border-color: oklch(30% 0.02 280) !important; }
      .border-ink-soft { border-color: oklch(38% 0.04 280) !important; }

      /* ── Domain + accent light backgrounds ── */
      .bg-domain-gross-light     { background-color: oklch(22% 0.08 142) !important; }
      .bg-domain-fine-light      { background-color: oklch(20% 0.08 260) !important; }
      .bg-domain-language-light  { background-color: oklch(22% 0.07 85)  !important; }
      .bg-domain-cognitive-light { background-color: oklch(21% 0.06 310) !important; }
      .bg-domain-social-light    { background-color: oklch(21% 0.07 200) !important; }
      .bg-piaget-light           { background-color: oklch(22% 0.07 250) !important; }
      .bg-retro-light            { background-color: oklch(22% 0.06 20)  !important; }

      /* ── Inputs ── */
      input[type="text"],
      input[type="date"] {
        background-color: oklch(22% 0.02 280);
        color: oklch(88% 0.02 280);
        border-color: oklch(35% 0.03 280);
        color-scheme: dark;
      }
      input::placeholder { color: oklch(48% 0.05 280); }

      /* ── Todo items ── */
      .todo-text { color: oklch(88% 0.02 280); }
      .todo-checkbox {
        background: oklch(22% 0.02 280);
        border-color: oklch(40% 0.04 280);
      }
      .todo-item:hover { background: oklch(26% 0.03 280); }
      .todo-item:hover .todo-checkbox { border-color: oklch(64% 0.06 280); }
      .todo-item.locked:hover { background: transparent; }
      .stage-dropdown-item:hover { background: oklch(26% 0.03 280); }
      .stage-dropdown-item.active { background: oklch(28% 0.05 260); }
      .todo-item.locked .todo-checkbox {
        background: oklch(28% 0.02 280);
        border-color: oklch(28% 0.02 280);
      }

      /* ── Percentile bars ── */
      .pct-rail       { background: oklch(30% 0.02 280); }
      .pct-zone-outer { background: oklch(42% 0.10 142 / 0.55); }
      .pct-zone-inner { background: oklch(52% 0.20 142 / 0.45); }
      .pct-median     { background: oklch(62% 0.20 142 / 0.80); }
      .pct-label      { color: oklch(55% 0.06 280); }
      .pct-baby-dot   { border-color: oklch(25% 0.02 280); }

      /* ── Piaget drawer ── */
      #piaget-drawer { background-color: oklch(17% 0.02 280) !important; }
      #piaget-drawer .sticky { background-color: oklch(17% 0.02 280) !important; }

      /* ── Progress bar track ── */
      .bg-border.rounded-full { background-color: oklch(28% 0.02 280) !important; }

      /* ── Shadow softening in dark ── */
      .shadow-sm  { box-shadow: 0 1px 3px oklch(0% 0 0 / 0.4) !important; }
      .shadow-lg  { box-shadow: 0 10px 30px oklch(0% 0 0 / 0.5) !important; }
      .shadow-xl  { box-shadow: 0 20px 40px oklch(0% 0 0 / 0.6) !important; }

      /* ── Piaget Modal Dark Mode ── */
      #piaget-modal { background: oklch(19% 0.02 280); }

      .piaget-timeline-card:hover {
        background: oklch(28% 0.02 280);
      }

      .piaget-timeline-card.active {
        background: oklch(28% 0.02 280);
        border-left-color: oklch(65% 0.18 200);
      }

      .piaget-accordion-header {
        border-color: oklch(30% 0.02 280);
        color: oklch(88% 0.02 280);
      }

      .piaget-accordion-header:hover {
        color: oklch(65% 0.18 200);
      }

      .piaget-schema-link {
        background: oklch(25% 0.02 280);
      }

      .piaget-schema-text {
        color: oklch(72% 0.04 280);
      }
    }

    /* 移動端時間軸抽屜 */
    #piaget-timeline-drawer {
      box-shadow: 2px 0 8px oklch(0% 0 0 / 0.15);
    }

    #piaget-timeline-drawer.open {
      transform: translateX(0);
    }

    #piaget-timeline-overlay.open {
      display: block;
    }

    /* 簡化的時間軸卡片（移動版） */
    .piaget-timeline-card-mobile {
      padding: 12px;
      border-radius: 8px;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
      min-width: 100%;
    }

    .piaget-timeline-card-mobile:hover {
      background: oklch(91% 0.05 280);
    }

    .piaget-timeline-card-mobile.active {
      background: oklch(91% 0.08 280);
      border-left-color: oklch(60% 0.20 200);
    }

    .piaget-timeline-card-mobile .stage-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .piaget-timeline-card-mobile .stage-dot.past {
      background: oklch(65% 0.25 142);
    }

    .piaget-timeline-card-mobile .stage-dot.current {
      background: oklch(60% 0.20 200);
    }

    .piaget-timeline-card-mobile .stage-dot.future {
      background: transparent;
      border: 2px solid oklch(87% 0.02 280);
      width: 6px;
      height: 6px;
      margin-left: 1px;
    }

    @media (prefers-color-scheme: dark) {
      #piaget-timeline-drawer {
        background: oklch(19% 0.02 280);
      }

      .piaget-timeline-card-mobile:hover {
        background: oklch(28% 0.02 280);
      }

      .piaget-timeline-card-mobile.active {
        background: oklch(28% 0.02 280);
        border-left-color: oklch(65% 0.18 200);
      }

      .piaget-timeline-card-mobile .stage-dot.future {
        border-color: oklch(30% 0.02 280);
      }

      /* Concept Chip Dark Mode */
      .concept-chip {
        background: oklch(22% 0.03 280);
        border-color: oklch(30% 0.02 280);
      }

      .concept-chip:hover {
        background: oklch(25% 0.03 280);
        border-color: oklch(38% 0.02 280);
      }

      .concept-chip-name {
        color: oklch(92% 0.02 280);
      }

      .concept-chip-desc {
        color: oklch(68% 0.05 280);
      }

      .concept-chip-example {
        color: oklch(60% 0.08 280);
        border-left-color: oklch(45% 0.08 280);
      }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     SETUP SCREEN
     ══════════════════════════════════════ -->
<div id="setup-screen" class="flex items-center justify-center min-h-screen p-4 sm:p-6 bg-bg">
  <div class="bg-surface rounded-2xl shadow-lg p-8 sm:p-12 max-w-sm sm:max-w-96 w-full text-center fade-in">
    <span class="text-4xl sm:text-5xl block mb-4 sm:mb-6">🌱</span>
    <h1 class="font-display text-2xl sm:text-3xl font-bold mb-2 sm:mb-3 text-ink">寶寶發展追蹤</h1>
    <p class="text-xs sm:text-sm text-ink-faint leading-relaxed mb-6 sm:mb-8">輸入寶寶的姓名與出生日期，每次打開都會根據<strong>實際月齡與週數</strong>顯示當前發展任務清單。</p>
    <div class="text-left mb-5 sm:mb-5">
      <label class="block text-xs font-semibold text-ink-soft uppercase tracking-wide mb-2">寶寶的名字</label>
      <input type="text" id="baby-name-input" placeholder="例：小橘子" maxlength="20" class="w-full px-4 py-3 border border-border rounded-lg bg-bg outline-none transition-colors focus:border-ink focus:bg-surface">
    </div>
    <div class="text-left mb-6">
      <label class="block text-xs font-semibold text-ink-soft uppercase tracking-wide mb-2">出生日期</label>
      <input type="date" id="birth-date-input" class="w-full px-4 py-3 border border-border rounded-lg bg-bg outline-none transition-colors focus:border-ink focus:bg-surface">
    </div>
    <button onclick="saveAndStart()" class="w-full px-4 py-2.5 sm:py-3 text-sm sm:text-base bg-ink text-surface font-semibold rounded-lg hover:bg-ink-soft active:scale-95 transition-all">開始追蹤 →</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     MAIN APP
     ══════════════════════════════════════ -->
<div id="app-screen" class="hidden">

  <!-- TOPBAR -->
  <div class="sticky top-0 z-50 bg-ink text-surface px-4 sm:px-8 py-4 sm:py-5 flex items-center gap-3 sm:gap-5 border-b border-ink-soft">
    <div class="flex-1">
      <div class="font-mono text-xs uppercase tracking-widest text-retro hidden sm:block">Baby Development Tracker</div>
      <div class="font-display text-lg sm:text-xl font-bold text-surface" id="display-name">寶寶</div>
    </div>
    <div class="bg-retro text-white px-3 sm:px-5 py-2 rounded-full text-center whitespace-nowrap">
      <div class="font-mono text-sm sm:text-lg font-semibold" id="display-age">0m 0w</div>
      <div class="text-xs opacity-85 hidden sm:block" id="display-age-exact">0個月 0週</div>
    </div>
    <button onclick="changeProfile()" class="px-2 sm:px-4 py-2 text-xs sm:text-sm font-medium rounded-lg hover:bg-ink-soft transition-colors whitespace-nowrap">更改資料</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="px-8 py-6 max-w-5xl mx-auto">

    <!-- Progress strip -->
    <div class="mb-8 fade-in">
      <div class="mb-6">
        <h2 class="font-display text-3xl font-bold text-ink" id="current-stage-label">新生兒期</h2>
        <p class="text-sm text-ink-faint mt-1" id="progress-desc">距離下一個發展階段還有 — 天</p>
      </div>
      <div>
        <div class="flex justify-between text-xs text-ink-faint mb-2 font-mono">
          <span>出生</span>
          <span>12個月</span>
          <span>24個月</span>
        </div>
        <div class="h-2 bg-border rounded-full overflow-hidden">
          <div class="h-full bg-gradient-to-r from-retro to-piaget rounded-full transition-all" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Alert -->
    <div id="alert-strip" class="mb-6"></div>

    <!-- Current todo card -->
    <h3 class="text-sm font-semibold text-ink-soft uppercase tracking-wide mb-4">本週發展任務清單</h3>
    <div class="bg-surface rounded-lg shadow-sm p-6 mb-8 fade-in" id="todo-card">
      <h3 class="font-display text-2xl font-bold text-ink mb-2" id="todo-title">載入中…</h3>
      <p class="text-sm text-ink-soft mb-4" id="todo-subtitle"></p>
      <div id="todo-domains"></div>

      <!-- Piaget trigger -->
      <div class="mt-6 pt-6 border-t border-border">
        <button onclick="openPiagetModal()" class="w-full flex items-center gap-4 p-4 bg-piaget-light rounded-lg hover:bg-piaget/10 transition-colors">
          <span class="text-2xl">🔬</span>
          <div class="text-left flex-1">
            <div class="text-sm font-semibold text-piaget">延伸探索 — 皮亞傑認知發展</div>
            <div class="text-xs text-ink-soft" id="piaget-trigger-desc">查看本階段對應的認知架構與促進活動</div>
          </div>
          <span class="text-lg text-piaget">→</span>
        </button>
      </div>
    </div>

    <!-- Upcoming milestones -->
    <h3 class="text-sm font-semibold text-ink-soft uppercase tracking-wide mb-4" id="upcoming-title">即將到來的里程碑</h3>
    <div class="grid gap-4 grid-cols-1 md:grid-cols-2 lg:grid-cols-3 mb-8" id="upcoming-grid"></div>

    <!-- Past milestones toggle -->
    <button onclick="togglePastMilestones()" class="px-4 py-2 bg-border text-ink text-sm font-medium rounded-lg hover:bg-border/80 transition-colors mb-8">查看過往里程碑</button>

    <!-- Past milestones grid (initially hidden) -->
    <div id="past-milestones-container" class="hidden">
      <h3 class="text-sm font-semibold text-ink-soft uppercase tracking-wide mb-4">過往里程碑</h3>
      <div class="grid gap-4 grid-cols-1 md:grid-cols-2 lg:grid-cols-3 mb-8" id="past-grid"></div>
    </div>

    <button onclick="resetChecks()" class="px-4 py-2 bg-border text-ink text-sm font-medium rounded-lg hover:bg-border/80 transition-colors">重設勾選狀態</button>

  </div><!-- /content -->
</div><!-- /app-screen -->

<!-- ══════════════════════════════════════
     PIAGET MODAL - FULL SCREEN
     ══════════════════════════════════════ -->
<!-- Modal Overlay -->
<div id="piaget-modal-overlay" onclick="closePiagetModal()" class="hidden fixed inset-0 bg-black/50 z-50 transition-opacity"></div>

<!-- Full-Screen Modal -->
<div id="piaget-modal" role="dialog" aria-modal="true" aria-label="皮亞傑認知發展理論" class="hidden fixed inset-0 z-50 overflow-y-auto bg-surface flex flex-col">

  <!-- Header (Sticky) -->
  <div class="sticky top-0 bg-surface border-b border-border z-20 px-6 py-4">
    <div class="flex justify-between items-start">
      <!-- Mobile hamburger (shown only on mobile) -->
      <button id="piaget-timeline-toggle" onclick="togglePiagetTimeline()" class="md:hidden text-2xl text-ink-soft hover:text-ink transition-colors mr-3" aria-label="時間軸">☰</button>

      <div class="flex-1">
        <h1 class="font-display text-2xl font-bold text-ink">皮亞傑認知發展理論</h1>
        <p class="text-sm text-ink-soft mt-2" id="piaget-modal-stage">感覺動作期 · 第一階段：反射練習期 (0–1 個月)</p>
      </div>
      <button onclick="closePiagetModal()" class="text-2xl text-ink-soft hover:text-ink transition-colors ml-4" aria-label="關閉">✕</button>
    </div>
  </div>

  <!-- Content Area - Responsive Layout -->
  <div class="flex flex-1 min-h-0 relative">
    <!-- Timeline Sidebar (Desktop version - Hidden on mobile) -->
    <aside id="piaget-timeline" class="hidden md:flex md:w-1/3 md:border-r md:border-border md:overflow-y-auto md:flex-col p-4 gap-2">
      <!-- Timeline cards generated by JS -->
    </aside>

    <!-- Timeline Drawer (Mobile version - Hidden on desktop) -->
    <div id="piaget-timeline-drawer" class="md:hidden fixed inset-y-0 left-0 w-64 bg-surface border-r border-border z-40 transform -translate-x-full transition-transform duration-300 overflow-y-auto flex flex-col p-4 gap-2" style="top: var(--header-height, 80px)">
      <!-- Mobile timeline cards generated by JS -->
    </div>

    <!-- Mobile drawer overlay (backdrop) -->
    <div id="piaget-timeline-overlay" class="md:hidden hidden fixed inset-0 bg-black/30 z-30" onclick="togglePiagetTimeline()" style="top: var(--header-height, 80px)"></div>

    <!-- Main Content Area -->
    <div id="piaget-modal-body" class="flex-1 overflow-y-auto p-6">
      <!-- Accordion content generated by JS -->
    </div>
  </div>

</div>

<!-- D3 库 -->
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<!-- 应用脚本（按顺序加载） -->
<script type="module">
  (async () => {
    try {
      const appModule = await import('./app.js');
      const drawerModule = await import('./drawer.js');
      const timelineModule = await import('./timeline.js');

      window.saveAndStart = appModule.saveAndStart;
      window.changeProfile = appModule.changeProfile;
      window.resetChecks = appModule.resetChecks;
      window.initApp = appModule.initApp;
      window.closePiagetModal = drawerModule.closePiagetModal;
      window.openPiagetModal = drawerModule.openPiagetModal;
      window.D3Timeline = timelineModule.D3Timeline;

      Object.defineProperty(window, 'currentMilestoneIndex', {
        get() { return appModule.currentMilestoneIndex; },
        set(val) { appModule.currentMilestoneIndex = val; }
      });

      if (localStorage.getItem('baby_name') && localStorage.getItem('baby_dob')) {
        window.initApp();
      }

      console.log('[init] Ready');
    } catch (err) {
      console.error('[init] Error:', err.message);
    }
  })();
</script>

</body>
</html>
